title: SQL Injection via sqlmap — Automated Tool Detection
id: a1b2c3d4-1111-2222-3333-000000000004
status: stable
description: >
  Detects automated SQL injection testing using sqlmap based on User-Agent string
  and SQL injection payloads in query parameters. A 500 response to a UNION payload
  confirms server-side vulnerability. Observed: 5.5.5.5 targeting /login on 2026-05-08.
author: LogSec Toolkit
date: 2026/06/10
references:
  - https://attack.mitre.org/techniques/T1190/
  - https://sqlmap.org/
tags:
  - attack.initial_access
  - attack.t1190
  - attack.t1059
logsource:
  category: webserver
detection:
  useragent_match:
    cs(User-Agent)|contains: 'sqlmap'
  payload_match:
    cs-uri-query|contains:
      - 'UNION+SELECT'
      - 'UNION SELECT'
      - 'AND+1=1'
      - 'AND 1=1'
      - "' OR '"
      - '--'
      - 'ORDER+BY'
      - 'BENCHMARK('
      - 'SLEEP('
      - 'WAITFOR+DELAY'
  server_error:
    sc-status: 500
    cs-uri-query|contains:
      - 'UNION'
      - 'SELECT'
  condition: useragent_match or payload_match or server_error
falsepositives:
  - Authorized penetration tests (coordinate with security team, add tester IPs to exception list)
  - Legitimate application errors unrelated to SQLi (review cs-uri-query before closing)
level: critical
